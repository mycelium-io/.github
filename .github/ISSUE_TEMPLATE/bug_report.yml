name: Bug Report
description: Report a bug in Mycelium
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `mycelium room create ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mycelium Version
      description: Output of `mycelium --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Mycelium is affected?
      options:
        - CLI (mycelium-cli)
        - Backend (fastapi-backend)
        - Client (mycelium-client)
        - Adapter — Claude Code
        - Adapter — OpenClaw
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, database version, etc.
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.12.3
        - Database: AgensGraph 2.14
